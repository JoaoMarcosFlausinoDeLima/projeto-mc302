plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
    // JavaFX para a interface gráfica desktop.
    id 'org.openjfx.javafxplugin' version '0.1.0'
    id 'jacoco'
}

javafx {
    version = '21.0.5'
    modules = ['javafx.controls']
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
    
    // Add Maven repos for yahoofinance-api
    maven {
        url "https://jcenter.bintray.com"
        url 'https://jitpack.io'
    }
    maven {
        url "https://oss.sonatype.org/content/repositories/releases"
    }
}

dependencies {
    // Use JUnit Jupiter for testing.
    testImplementation libs.junit.jupiter

    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    
    implementation 'org.slf4j:slf4j-api:1.7.36'

    implementation 'com.fasterxml.jackson.core:jackson-databind:2.17.0'
    implementation 'com.github.sstrickx:yahoofinance-api:3.17.0'
    implementation "com.google.code.gson:gson:2.10.1"
    implementation 'org.slf4j:slf4j-simple:1.7.36'
    implementation("org.jsoup:jsoup:1.15.2")
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

application {
    // Define the main class for the application (interface gráfica JavaFX).
    mainClass = 'projeto.gui.MainApp'
    //mainClass = 'projeto.App'
}

tasks.named('test') {
    // Use JUnit Platform for unit tests.
    useJUnitPlatform()

    // Isola os arquivos criados pelos testes (data/, carteira.json)
    // para não misturar com os dados reais do app.
    workingDir = layout.buildDirectory.dir('test-work').get().asFile
    doFirst { workingDir.mkdirs() }

    // Testes de GUI abrem janelas: mostra o andamento no terminal.
    testLogging {
        events 'passed', 'failed', 'skipped'
        showStandardStreams = false
    }

    finalizedBy(tasks.named('jacocoTestReport'))
}

tasks.named('jacocoTestReport') {
    dependsOn(tasks.named('test'))
    reports {
        xml.required = true
        html.required = true
    }
}
